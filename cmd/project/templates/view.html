<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.FilePath}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11.7.0/dist/mermaid.min.js"></script>
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: none;
            margin: 0;
            padding: 0;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            border-bottom: 1px solid #e5e7eb;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
        }
        .markdown-body code {
            background-color: rgba(175,184,193,0.2);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 85%;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }
        .mermaid-container {
            background: white;
            border-radius: 8px;
            margin: 16px auto;
            border: 1px solid #e5e7eb;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        .mermaid {
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mermaid svg {
            max-width: 100%;
            height: auto;
            display: block;
        }
        /* 甘特图特殊处理：需要更大的宽度 */
        .mermaid.gantt-chart {
            min-width: 1200px;
        }
        .mermaid.gantt-chart svg {
            min-width: 1200px;
        }
        /* 重置按钮 */
        .chart-reset-btn {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 10;
            opacity: 0.9;
        }
        .chart-reset-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            opacity: 1;
        }
        .chart-reset-btn:active {
            transform: scale(0.95);
        }
        .chart-reset-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        .chart-reset-btn:hover svg {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-5xl">
        <!-- Toolbar -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-semibold text-gray-900">{{.FilePath}}</h1>
                        <p class="text-sm text-gray-500">Markdown 文档</p>
                    </div>
                </div>
                <div class="flex space-x-3">
                    <a href="/" 
                       class="inline-flex items-center px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors font-medium text-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        返回列表
                    </a>
                    <a href="{{.RawPath}}" 
                       class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium text-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                        </svg>
                        查看源码
                    </a>
                </div>
            </div>
        </div>

        <!-- Usage Tips -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4 text-sm">
            <div class="flex items-start">
                <svg class="w-5 h-5 text-blue-600 mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <div>
                    <strong class="text-blue-900">图表交互说明：</strong>
                    <span class="text-blue-800">
                        🖱️ 拖拽平移 · 🔍 滚轮缩放 · 🖱️ 双击放大 · 🔄 右下角重置 · ⌨️ 快捷键（+ 放大 / - 缩小 / 0 重置）
                    </span>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 markdown-body" id="content">
            <!-- Markdown content will be rendered here -->
        </div>
    </div>
    
    <!-- 原始内容 -->
    <script type="text/plain" id="markdown-content">{{.Content}}</script>

    <script>
        // 存储所有图表的 pan-zoom 实例和初始状态
        const chartInstances = new Map();
        
        document.addEventListener("DOMContentLoaded", function() {
            const markdownContent = document.getElementById('markdown-content').textContent;
            const contentDiv = document.getElementById('content');
            
            console.log('开始渲染 Markdown...');
            
            // 配置 marked.js
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function(code, lang) {
                    // 对于 mermaid 代码块，保持原样不做语法高亮
                    if (lang === 'mermaid') {
                        return code;
                    }
                    return code;
                }
            });
            
            // 渲染 markdown
            let html = marked.parse(markdownContent);
            contentDiv.innerHTML = html;
            
            console.log('Markdown 渲染完成');
            
            // 初始化 Mermaid
            if (typeof mermaid !== 'undefined') {
                console.log('初始化 Mermaid...');
                
                try {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'default',
                        securityLevel: 'loose',
                        logLevel: 'error',
                        flowchart: {
                            useMaxWidth: true,
                            htmlLabels: true,
                            curve: 'basis'
                        },
                        gantt: {
                            useMaxWidth: true,
                            fontSize: 11,
                            fontFamily: 'Arial, sans-serif'
                        },
                        gitGraph: {
                            showBranches: true,
                            showCommitLabel: true,
                            mainBranchName: 'main',
                            rotateCommitLabel: false,
                            useMaxWidth: true
                        },
                        sequence: {
                            useMaxWidth: true
                        },
                        journey: {
                            useMaxWidth: true
                        },
                        er: {
                            useMaxWidth: true
                        },
                        pie: {
                            useMaxWidth: true
                        },
                        themeVariables: {
                            git0: '#1f77b4',
                            git1: '#ff7f0e',
                            git2: '#2ca02c',
                            git3: '#d62728',
                            gitBranchLabel0: '#ffffff',
                            gitBranchLabel1: '#ffffff',
                            commitLabelColor: '#000000',
                            commitLabelBackground: '#ffffff'
                        }
                    });
                    
                    // 查找所有 mermaid 代码块并转换
                    const mermaidBlocks = contentDiv.querySelectorAll('code.language-mermaid');
                    console.log('找到', mermaidBlocks.length, '个 mermaid 图表');
                    
                    mermaidBlocks.forEach((block, index) => {
                        const preElement = block.parentElement;
                        const mermaidCode = block.textContent;
                        
                        console.log('处理图表', index + 1);
                        
                        // 创建外层容器
                        const containerDiv = document.createElement('div');
                        containerDiv.className = 'mermaid-container';
                        containerDiv.id = 'chart-container-' + index;
                        containerDiv.style.position = 'relative';
                        
                        // 创建 mermaid 容器
                        const mermaidDiv = document.createElement('div');
                        mermaidDiv.className = 'mermaid';
                        
                        // 检测是否是甘特图，添加特殊类
                        if (mermaidCode.trim().startsWith('gantt')) {
                            mermaidDiv.classList.add('gantt-chart');
                            console.log('检测到甘特图，应用特殊样式');
                        }
                        
                        mermaidDiv.textContent = mermaidCode;
                        
                        // 创建重置按钮
                        const resetBtn = document.createElement('button');
                        resetBtn.className = 'chart-reset-btn';
                        resetBtn.title = '重置图表缩放';
                        resetBtn.setAttribute('data-chart-id', 'chart-container-' + index);
                        resetBtn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>' +
                            '</svg>';
                        
                        // 组装结构
                        containerDiv.appendChild(mermaidDiv);
                        containerDiv.appendChild(resetBtn);
                        
                        // 替换原来的 pre 元素
                        preElement.parentNode.replaceChild(containerDiv, preElement);
                    });
                    
                    // 渲染所有 mermaid 图表
                    mermaid.run({
                        querySelector: '.mermaid'
                    }).then(() => {
                        console.log('所有 Mermaid 图表渲染完成');
                        
                        // 初始化纯 JavaScript 的缩放和平移功能
                        setTimeout(function() {
                            document.querySelectorAll('.mermaid-container').forEach(function(container) {
                                const svg = container.querySelector('svg');
                                if (!svg) return;
                                
                                const containerId = container.id;
                                console.log('初始化交互功能:', containerId);
                                
                                // 状态
                                let scale = 1;
                                let translateX = 0;
                                let translateY = 0;
                                let isDragging = false;
                                let startX, startY;
                                
                                // 应用变换
                                function applyTransform() {
                                    svg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                                }
                                
                                // 鼠标拖拽
                                svg.addEventListener('mousedown', function(e) {
                                    isDragging = true;
                                    startX = e.clientX - translateX;
                                    startY = e.clientY - translateY;
                                    svg.style.cursor = 'grabbing';
                                    e.preventDefault();
                                });
                                
                                document.addEventListener('mousemove', function(e) {
                                    if (!isDragging) return;
                                    translateX = e.clientX - startX;
                                    translateY = e.clientY - startY;
                                    applyTransform();
                                });
                                
                                document.addEventListener('mouseup', function() {
                                    isDragging = false;
                                    svg.style.cursor = 'grab';
                                });
                                
                                // 滚轮缩放
                                svg.addEventListener('wheel', function(e) {
                                    e.preventDefault();
                                    const delta = e.deltaY > 0 ? 0.97 : 1.03;
                                    scale *= delta;
                                    scale = Math.max(0.1, Math.min(10, scale));
                                    applyTransform();
                                });
                                
                                // 双击放大
                                svg.addEventListener('dblclick', function(e) {
                                    scale *= 1.2;
                                    scale = Math.min(10, scale);
                                    applyTransform();
                                });
                                
                                svg.style.cursor = 'grab';
                                svg.style.transition = 'transform 0.1s ease-out';
                                
                                // 保存初始状态和重置函数
                                chartInstances.set(containerId, {
                                    reset: function() {
                                        scale = 1;
                                        translateX = 0;
                                        translateY = 0;
                                        applyTransform();
                                    },
                                    zoomIn: function() {
                                        scale *= 1.05;
                                        scale = Math.min(10, scale);
                                        applyTransform();
                                    },
                                    zoomOut: function() {
                                        scale *= 0.95;
                                        scale = Math.max(0.1, scale);
                                        applyTransform();
                                    }
                                });
                                
                                console.log('图表交互已启用');
                            });
                            
                            // 绑定重置按钮
                            document.querySelectorAll('.chart-reset-btn').forEach(btn => {
                                btn.addEventListener('click', function() {
                                    const chartId = this.getAttribute('data-chart-id');
                                    const chartData = chartInstances.get(chartId);
                                    if (chartData) {
                                        chartData.reset();
                                        console.log('图表已重置');
                                        
                                        // 视觉反馈
                                        this.style.transform = 'rotate(360deg) scale(0.9)';
                                        setTimeout(() => {
                                            this.style.transform = '';
                                        }, 300);
                                    }
                                });
                            });
                        }, 500);
                    }).catch(error => {
                        console.error('Mermaid 渲染失败:', error);
                        // 显示错误信息
                        document.querySelectorAll('.mermaid').forEach((div) => {
                            if (!div.querySelector('svg')) {
                                const originalCode = div.textContent;
                                div.innerHTML = '<div class="text-red-500 p-3 border border-red-300 rounded bg-red-50">' +
                                    '<strong>图表渲染失败:</strong> ' + error.message + '<br>' +
                                    '<pre class="text-xs mt-2 p-2 bg-gray-100 text-left overflow-x-auto">' + 
                                    originalCode.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>' +
                                    '</div>';
                            }
                        });
                    });
                    
                } catch (error) {
                    console.error('Mermaid 初始化失败:', error);
                }
            } else {
                console.error('Mermaid 库未加载');
            }
            
                // 全局键盘快捷键
                document.addEventListener('keydown', function(e) {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        return;
                    }
                    
                    switch(e.key) {
                        case '+':
                        case '=':
                            chartInstances.forEach(chartData => {
                                chartData.zoomIn();
                            });
                            e.preventDefault();
                            break;
                        case '-':
                            chartInstances.forEach(chartData => {
                                chartData.zoomOut();
                            });
                            e.preventDefault();
                            break;
                        case '0':
                            chartInstances.forEach(chartData => {
                                chartData.reset();
                            });
                            e.preventDefault();
                            break;
                    }
                });
        });
    </script>
    
    <!-- 数学公式支持 - MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true,
                tags: 'ams'
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'a']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
